<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MEMS Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="media/css/core.css" />
</head>

<body>
  <div class="mems-board-shell">

    <header class="board-header">
      <div class="brand-block">
        <div class="brand-mark">M</div>
        <div>
          <div class="board-kicker">MEMS Command Board</div>
          <h1 id="pageTitle">Summary</h1>
        </div>
      </div>

      <div class="header-right">
        <div class="system-pill" id="refreshStatus">
          <span class="status-dot good"></span>
          Live
        </div>

        <div class="board-clock">
          <div id="clockTime">--:--</div>
          <div id="clockDate">Loading date...</div>
        </div>
      </div>
    </header>

    <main id="appRoot" class="board-main">
      <!-- App content loads here -->
    </main>

    <nav class="board-tabs" aria-label="Dashboard tabs">
      <button class="tab-btn active" data-app="summary">
        <span class="tab-icon">◆</span>
        <span>Summary</span>
      </button>

      <button class="tab-btn" data-app="weather">
        <span class="tab-icon">☈</span>
        <span>Weather</span>
      </button>

      <button class="tab-btn" data-app="analytics">
        <span class="tab-icon">◈</span>
        <span>Analytics</span>
      </button>

      <button class="tab-btn" data-app="media">
        <span class="tab-icon">◉</span>
        <span>Media Watch</span>
      </button>

      <button class="tab-btn" data-app="calendar">
        <span class="tab-icon">▣</span>
        <span>Calendar</span>
      </button>

      <button class="tab-btn" data-app="tools">
        <span class="tab-icon">⚙</span>
        <span>Tools</span>
      </button>
    </nav>

  </div>

  <script src="media/js/core.js"></script>
</body>
</html>
