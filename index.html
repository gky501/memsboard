<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MEMS Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="media/css/core.css" />
</head>

<body>
  <div class="board-shell">

    <header class="board-header">
      <div>
        <div class="board-kicker">Personal Command Board</div>
        <h1 id="pageTitle">Command</h1>
      </div>

      <div class="board-clock">
        <div id="clockTime">--:--</div>
        <div id="clockDate">Loading...</div>
      </div>
    </header>

    <main id="appRoot" class="board-main">
      <!-- App loads here -->
    </main>

    <nav class="board-tabs" aria-label="Dashboard tabs">
      <button class="tab-btn active" data-app="command">Command</button>
      <button class="tab-btn" data-app="weather">Weather</button>
      <button class="tab-btn" data-app="calendar">Calendar</button>
      <button class="tab-btn" data-app="legislation">Legislation</button>
      <button class="tab-btn" data-app="news">News</button>
      <button class="tab-btn" data-app="metrics">Metrics</button>
      <button class="tab-btn" data-app="tools">Tools</button>
    </nav>

  </div>

  <script src="media/js/core.js"></script>
</body>
</html>
