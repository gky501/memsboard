<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MEMS Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="media/css/core.css" />
</head>

<body>
  <div class="board-shell">

    <header class="board-header">
      <div>
        <div class="board-kicker">Personal Command Board</div>
        <h1 id="pageTitle">Command</h1>
      </div>

      <div class="board-clock">
        <div id="clockTime">--:--</div>
        <div id="clockDate">Loading...</div>
      </div>
    </header>

    <main id="appRoot" class="board-main">
      <!-- App loads here -->
    </main>

<nav class="board-tabs" aria-label="Dashboard tabs">
  <button class="tab-btn active" data-app="command">
    <i class="las la-th-large" aria-hidden="true"></i>
    <span>Command</span>
  </button>

  <button class="tab-btn" data-app="weather">
    <i class="las la-cloud-sun" aria-hidden="true"></i>
    <span>Weather</span>
  </button>

  <button class="tab-btn" data-app="calendar">
    <i class="las la-calendar-alt" aria-hidden="true"></i>
    <span>Calendar</span>
  </button>

  <button class="tab-btn" data-app="legislation">
    <i class="las la-balance-scale" aria-hidden="true"></i>
    <span>Legislation</span>
  </button>

  <button class="tab-btn" data-app="news">
    <i class="las la-newspaper" aria-hidden="true"></i>
    <span>News</span>
  </button>

  <button class="tab-btn" data-app="metrics">
    <i class="las la-chart-line" aria-hidden="true"></i>
    <span>Metrics</span>
  </button>

  <button class="tab-btn" data-app="tools">
    <i class="las la-tools" aria-hidden="true"></i>
    <span>Tools</span>
  </button>
</nav>

  </div>

  <script src="media/js/core.js"></script>
</body>
</html>
